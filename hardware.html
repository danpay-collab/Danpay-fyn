<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware løsninger - Danpay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#f1f5f9}

/* NAV */
.nav{display:flex;justify-content:space-between;padding:16px 10%;background:white}
.logo img{height:40px}

/* HERO */
.hero{
height:420px;
background:url('hardware.jpg') center/cover no-repeat;
display:flex;align-items:center;justify-content:center;
flex-direction:column;color:white;text-align:center;position:relative;
}
.hero::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.5)}
.hero h1,.hero p{position:relative}

/* FILTER */
.categories{display:flex;justify-content:center;gap:15px;padding:25px}
.categories button{
padding:10px 20px;border:none;border-radius:20px;background:#e2e8f0;cursor:pointer;
}
.categories .active{background:#3b82f6;color:white}

/* GRID */
.products{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;padding:40px 10%}
.card{
background:white;border-radius:12px;padding:15px;text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05)
}
.card img{width:100%;height:120px;object-fit:contain}
.card p{font-size:14px;min-height:50px}
select{padding:6px;border-radius:6px;margin:5px 0;width:100%}
.price{font-weight:600;margin:5px 0}

/* QTY */
.qty{display:flex;justify-content:center;gap:10px}
.qty button{width:28px;height:28px;border:none;background:#e2e8f0;border-radius:6px;cursor:pointer}
.qty input{width:40px;text-align:center}

/* INFO BUTTON */
.info-btn{
margin-top:8px;background:#3b82f6;color:white;border:none;
padding:6px 10px;border-radius:6px;cursor:pointer
}

/* MODAL */
.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
align-items:center;justify-content:center;z-index:999;
}
.modal-box{
background:white;border-radius:16px;padding:25px;
max-width:700px;width:90%;position:relative;
}
.modal-img{
width:140px;margin:15px auto;display:block;
}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.badge{background:#e0f2fe;padding:6px 10px;border-radius:8px;font-size:12px}

.info-grid{
display:grid;grid-template-columns:1fr 1fr;gap:15px;
}

/* TOTAL */
.total{padding:30px 10%;text-align:right;font-size:22px;font-weight:600}
</style>
</head>

<body>

<div class="nav">
<div class="logo"><img src="danpaylogo.jpg"></div>
<div>+45 70 18 00 99</div>
</div>

<div class="hero">
<h1>Skræddersyet hardware til din forretning</h1>
<p>Sammensæt din løsning og modtag et professionelt tilbud – hurtigt og nemt</p>
<p>Vores hardware leveres sammen med POS-software for optimal drift og integration</p>
</div>

<div class="categories">
<button onclick="filterCategory('all')" class="active">Alle</button>
<button onclick="filterCategory('kasse')">Kasseapparat</button>
<button onclick="filterCategory('tilbehor')">Tilbehør</button>
<button onclick="filterCategory('stativ')">Stativer</button>
</div>

<div class="products" id="products"></div>

<div class="total">Total: <span id="total">0</span> kr</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<span onclick="closeModal()" style="position:absolute;right:15px;top:10px;cursor:pointer">✕</span>

<h2 id="modalTitle"></h2>

<img id="modalImg" class="modal-img">

<div class="badges">
<span class="badge">POS</span>
<span class="badge">Hardware</span>
</div>

<div class="info-grid">
<div><b>Beskrivelse</b><p id="modalDesc"></p></div>
<div><b>Funktion</b><p id="modalFunc"></p></div>
<div><b>Specifikation</b><p id="modalSpec"></p></div>
<div><b>Forbindelse</b><p id="modalConn"></p></div>
</div>

</div>
</div>

<script>

const products = [

/* KASSE */
{
name:"Sunmi D3 Pro 15,6” Android",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_d3_front-1.png",
options:[
{label:"Uden printer & skuffe",price:6995},
{label:"Med printer & skuffe",price:8395}
],
extras:[
{label:"Ingen kundeskærm",price:0},
{label:"10,1” display",price:2195},
{label:"15,6” display",price:3695}
],
info:{
desc:"Komplet POS løsning",
func:"Butik og restaurant",
spec:"Android system",
conn:"USB / Ethernet"
}
},

{
name:"Sunmi Flex 3 KDS",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Flex-3.png",
options:[
{label:"18.5”",price:4955},
{label:"22”",price:4495},
{label:"27”",price:9695}
],
info:{
desc:"Køkkenskærm",
func:"KDS system",
spec:"Touch display",
conn:"LAN / WiFi"
}
},

{
name:"Sunmi CPad",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi-CPad.png",
options:[
{label:"8.7”",price:2795},
{label:"11”",price:2695},
{label:"14”",price:4695}
],
info:{
desc:"Tablet POS",
func:"Mobil løsning",
spec:"Android 14",
conn:"WiFi / Bluetooth"
}
},

{name:"Sunmi D3 Mini",price:5990,category:"kasse",img:"https://danpay.dk/wp-content/uploads/2025/05/1111111111-removebg-preview.png"},
{name:"Sunmi K2 Mini",price:9995,category:"kasse",img:"https://danpay.dk/wp-content/uploads/2026/01/sunmi_k2_wall_5.png"},

/* TILBEHØR */
{name:"Sunmi NT320 Printer",price:1995,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-NT320-Printer.png"},
{name:"Sunmi 2D Scanner",price:795,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_u2scanner.png"},
{name:"Scanner bordstativ",price:795,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_u2_stand.jpg"},
{name:"Kundedisplay 10,1”",price:2195,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_t3_10_disp_1-1.png"},
{name:"Kundedisplay 15,6”",price:3695,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/12/sunmi_t3_15_disp_1.png"},

/* STATIVER */
{name:"Sunmi Fixed Stativ",price:795,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Fixed-Stativ.png"},
{name:"Sunmi Table-Side Stativ",price:995,category:"stativ",img:"Sunmi CPad.png"},
{name:"Sunmi Pivoting Base",price:1295,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Multi-Function-Pivoting-Base.png"},
{name:"Sunmi Printing Base",price:1295,category:"stativ",img:"Sunmi Printing Base.png"},
{name:"Sunmi Desktop Base",price:1195,category:"stativ",img:"Sunmi Desktop Base.png"},
{name:"Sunmi Floor Stativ Flex 3 - Printer",price:6895,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Floor-Stativ-Printer.png"},
{name:"Sunmi Floor Stativ Flex 3 - Printer - Scanner - Table",price:9895,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Floor-Stativ-Printer-Scanner-Table.png"},
{name:"Sunmi Countertop Stativ Flex 3 - Printer",price:4995,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Countertop-Stativ-Printer.png"},
{name:"Sunmi Countertop Stativ Flex 3- Printer - Scanner",price:7295,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Countertop-Stativ-Printer-Scanner.png"}

];

let quantities={};

function renderProducts(filter="all"){
document.getElementById("products").innerHTML="";

products.forEach((p,i)=>{
if(filter!=="all" && p.category!==filter) return;

quantities[i]=quantities[i]||0;

let price=p.price||p.options?.[0].price||0;

let optHTML=p.options?`<select id="opt${i}" onchange="calc()">
${p.options.map((o,idx)=>`<option value="${idx}">${o.label} - ${o.price} kr</option>`).join("")}
</select>`:"";

let extraHTML=p.extras?`<select id="extra${i}" onchange="calc()">
${p.extras.map((e,idx)=>`<option value="${idx}">${e.label} (+${e.price} kr)</option>`).join("")}
</select>`:"";

document.getElementById("products").innerHTML+=`
<div class="card">
<img src="${p.img}">
<p>${p.name}</p>
${optHTML}
${extraHTML}
<div class="price" id="price${i}">${price} kr</div>

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<input id="q${i}" value="${quantities[i]}">
<button onclick="change(${i},1)">+</button>
</div>

<button class="info-btn" onclick="showInfo(${i})">Info</button>
</div>`;
});
}

function change(i,val){
quantities[i]+=val;
if(quantities[i]<0) quantities[i]=0;
document.getElementById("q"+i).value=quantities[i];
calc();
}

function calc(){
let total=0;

products.forEach((p,i)=>{
let price=p.price||0;

if(p.options){
let opt=document.getElementById("opt"+i);
if(opt) price=p.options[opt.value].price;
}

if(p.extras){
let extra=document.getElementById("extra"+i);
if(extra) price+=p.extras[extra.value].price;
}

let priceEl=document.getElementById("price"+i);
if(priceEl) priceEl.innerText=price+" kr";

total+=quantities[i]*price;
});

document.getElementById("total").innerText=total;
}

function showInfo(i){
let p=products[i];
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText=p.name;
document.getElementById("modalImg").src=p.img;

document.getElementById("modalDesc").innerText=p.info?.desc||"";
document.getElementById("modalFunc").innerText=p.info?.func||"";
document.getElementById("modalSpec").innerText=p.info?.spec||"";
document.getElementById("modalConn").innerText=p.info?.conn||"";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function filterCategory(cat){
document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
renderProducts(cat);
}

renderProducts();

</script>

</body>
</html>
