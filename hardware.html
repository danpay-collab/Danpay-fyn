<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware løsninger - Danpay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#f1f5f9}
.nav{display:flex;justify-content:space-between;padding:16px 10%;background:white}
.logo img{height:40px}

/* HERO */
.hero{
height:420px;
background:url('hardware.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-align:center;
position:relative;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}
.hero h1,.hero p{position:relative}

/* FILTER */
.categories{display:flex;justify-content:center;gap:15px;padding:25px}
.categories button{padding:10px 20px;border:none;border-radius:20px;background:#e2e8f0;cursor:pointer}
.categories .active{background:#3b82f6;color:white}

/* GRID */
.products{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:40px 10%}
.card{background:white;border-radius:12px;padding:15px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.card img{width:100%;height:120px;object-fit:contain}
.card p{font-size:14px;min-height:50px}
.price{font-weight:600;margin:5px 0}
select{width:100%;margin:5px 0}

/* QTY */
.qty{display:flex;justify-content:center;gap:10px}
.qty button{width:28px;height:28px;border:none;background:#e2e8f0;border-radius:6px}
.qty input{width:40px;text-align:center}

/* INFO */
.info-btn{margin-top:10px;background:#3b82f6;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:white;
border-radius:16px;
padding:30px;
width:520px;
max-width:90%;
}

.badges span{
background:#e2e8f0;
padding:5px 10px;
border-radius:20px;
margin:5px;
display:inline-block;
font-size:12px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:15px;
}

.total{padding:30px 10%;text-align:right;font-size:22px;font-weight:600}

@media(max-width:900px){
.products{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="nav">
<div class="logo"><img src="danpaylogo.jpg"></div>
<div>+45 70 18 00 99</div>
</div>

<div class="hero">
<h1>Skræddersyet hardware til din forretning</h1>
<p>Sammensæt din løsning og modtag et professionelt tilbud – hurtigt og nemt</p>
<p>Vores hardware leveres sammen med POS-software for optimal drift og integration</p>
</div>

<div class="categories">
<button onclick="filterCategory('all')" class="active">Alle</button>
<button onclick="filterCategory('kasse')">Kasseapparat</button>
<button onclick="filterCategory('tilbehor')">Tilbehør</button>
<button onclick="filterCategory('stativ')">Stativer</button>
</div>

<div class="products" id="products"></div>

<div class="total">
Total: <span id="total">0</span> kr
</div>

<div id="modal"></div>

<script>

const products = [

/* KASSE */
{
name:"Sunmi D3 Pro 15,6” Android",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_d3_front-1.png",
options:[
{label:"Uden printer & skuffe",price:6995},
{label:"Med printer & skuffe",price:8395}
],
extras:[
{label:"Ingen kundeskærm",price:0},
{label:"Kundedisplay 10,1”",price:2195},
{label:"Kundedisplay 15,6”",price:3695}
],
info:{title:"Sunmi D3 Pro",badges:["POS","Android"],description:"Komplet POS løsning"}
},

{
name:"Sunmi CPad",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi-CPad.png",
options:[
{label:'8.7"',price:2795},
{label:'11"',price:2695},
{label:'14"',price:4695}
],
info:{
title:"Sunmi CPad",
badges:["Android 14","64GB","NFC"],
sizes:['8.7"','11"','14"'],
connectivity:["USB-C","WiFi","Bluetooth"],
description:"Mobil POS tablet"
}
},

{
name:"Sunmi Flex 3 KDS",
category:"kasse",
img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Flex-3.png",
options:[
{label:'18.5"',price:4955},
{label:'22"',price:4495},
{label:'27"',price:9695}
],
info:{title:"Flex 3",description:"Køkkenskærm"}
},

{name:"Sunmi L3, USB-C, BT, WiFi, 4G, NFC, 6GB/128GB, Android",price:5990,category:"kasse",img:"Sunmi M3.png",
info:{title:"Sunmi L3",description:"Kompakt POS"}},

{name:"Sunmi M3, USB-C, BT, WiFi, NFC, 4GB/64GB, Android",price:5990,category:"kasse",img:"Sunmi M3.png",
info:{title:"Sunmi M3",description:"Kompakt POS"}},

{name:"Sunmi D3 Mini",price:5990,category:"kasse",img:"https://danpay.dk/wp-content/uploads/2025/05/1111111111-removebg-preview.png",
info:{title:"D3 Mini",description:"Kompakt POS"}},

{name:"Sunmi K2 Mini",price:9995,category:"kasse",img:"https://danpay.dk/wp-content/uploads/2026/01/sunmi_k2_wall_5.png",
info:{title:"K2 Mini",description:"Vægmonteret POS"}},

/* TILBEHØR */
{name:"Sunmi NT320 Printer",price:1995,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-NT320-Printer.png",
info:{title:"Printer",description:"80mm printer"}},

{name:"Sunmi 2D Scanner",price:795,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_u2scanner.png",
info:{title:"Scanner",description:"1D/2D scanning"}},

{name:"Scanner bordstativ",price:795,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_u2_stand.jpg",
info:{title:"Scanner stativ"}},

{name:"SUNMI Kundedisplay 10,1”",price:2195,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/11/sunmi_t3_10_disp_1-1.png",
info:{title:"10.1 display"}},

{name:"SUNMI Kundedisplay 15,6”",price:3695,category:"tilbehor",img:"https://danpay.dk/wp-content/uploads/2025/12/sunmi_t3_15_disp_1.png",
info:{title:"15.6 display"}},

{name:"Sunmi shoulder strap",price:395,category:"tilbehor",img:"Shoulder strap.png",
info:{title:"shoulder strap"}},

/* STATIVER */
{name:"Sunmi Fixed Stativ",price:795,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Fixed-Stativ.png",
info:{title:"Fixed stativ"}},

{name:"Sunmi Table-Side Stativ",price:995,category:"stativ",img:"Sunmi CPad.png",
info:{title:"Table side stativ"}},

{name:"Sunmi Pivoting Base",price:1295,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Multi-Function-Pivoting-Base.png",
info:{title:"Pivot base"}},

{name:"Sunmi Printing Base",price:1295,category:"stativ",img:"Sunmi Desktop Base.png",
info:{title:"Printing base"}},

{name:"Sunmi Desktop Base",price:1195,category:"stativ",img:"Sunmi Printing Base.png",
info:{title:"Desktop base"}},

{name:"Sunmi Floor Stativ - Printer",price:6895,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Floor-Stativ-Printer.png",
info:{title:"Floor stativ"}},

{name:"Sunmi Floor Stativ - Full",price:9895,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Floor-Stativ-Printer-Scanner-Table.png",
info:{title:"Floor full"}},

{name:"Sunmi Countertop Stativ",price:4995,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Countertop-Stativ-Printer.png",
info:{title:"Countertop"}},

{name:"Sunmi Countertop Stativ - Full",price:7295,category:"stativ",img:"https://danpay.dk/wp-content/uploads/2025/11/Sunmi-Countertop-Stativ-Printer-Scanner.png",
info:{title:"Countertop full"}},

];

let quantities={};

function renderProducts(filter="all"){
document.getElementById("products").innerHTML="";

products.forEach((p,i)=>{
if(filter!=="all" && p.category!==filter) return;

quantities[i]=quantities[i]||0;

let optionsHTML="";
let extrasHTML="";
let price=p.price||0;

if(p.options){
optionsHTML=`<select id="opt${i}" onchange="calc()">
${p.options.map((o,idx)=>`<option value="${idx}">${o.label} - ${o.price} kr</option>`).join("")}
</select>`;
price=p.options[0].price;
}

if(p.extras){
extrasHTML=`<select id="extra${i}" onchange="calc()">
${p.extras.map((e,idx)=>`<option value="${idx}">${e.label} (+${e.price} kr)</option>`).join("")}
</select>`;
}

document.getElementById("products").innerHTML+=`
<div class="card">
<img src="${p.img}">
<p>${p.name}</p>
${optionsHTML}
${extrasHTML}
<div class="price" id="price${i}">${price} kr</div>

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<input id="q${i}" value="${quantities[i]}">
<button onclick="change(${i},1)">+</button>
</div>

<button class="info-btn" onclick='openInfo(${JSON.stringify(p)})'>Info</button>
</div>`;
});
}

function filterCategory(cat){
document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
renderProducts(cat);
}

function change(i,val){
quantities[i]+=val;
if(quantities[i]<0) quantities[i]=0;
document.getElementById("q"+i).value=quantities[i];
calc();
}

function calc(){
let total=0;

products.forEach((p,i)=>{
let price=p.price||0;

if(p.options){
let opt=document.getElementById("opt"+i);
if(opt) price=p.options[opt.value].price;
}

if(p.extras){
let extra=document.getElementById("extra"+i);
if(extra) price+=p.extras[extra.value].price;
}

let priceEl=document.getElementById("price"+i);
if(priceEl) priceEl.innerText=price+" kr";

total+=quantities[i]*price;
});

document.getElementById("total").innerText=total;
}

function openInfo(p){
document.getElementById("modal").innerHTML=`
<div class="modal-box">
<h2>${p.info.title}</h2>

<div class="badges">
${(p.info.badges||[]).map(b=>`<span>${b}</span>`).join("")}
</div>

<div class="info-grid">
<div>
<h4>Skærm</h4>
<p>${(p.info.sizes||[]).join("<br>")}</p>

<h4>Tilslutning</h4>
<p>${(p.info.connectivity||[]).join(", ")}</p>
</div>

<div>
<h4>Specifikationer</h4>
<p>${(p.info.specs||[]).join("<br>")}</p>

<h4>Beskrivelse</h4>
<p>${p.info.description||""}</p>
</div>
</div>

<button onclick="closeInfo()">Luk</button>
</div>
`;
document.getElementById("modal").style.display="flex";
}

function closeInfo(){
document.getElementById("modal").style.display="none";
}

renderProducts();

</script>

</body>
</html>
