<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant - Danpay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    margin:0;
    background:#ffffff;
    color:#0f172a;
}

/* NAV */
.nav{
    position:sticky;
    top:0;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 10%;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo img{ height:45px; }

.nav-right{
    display:flex;
    gap:20px;
    align-items:center;
}

.phone{ text-decoration:none; color:#0f172a; font-weight:600; }

.cta-btn{
    background:linear-gradient(90deg,#0ea5e9,#3b82f6);
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
}

/* 🔥 HERO VIDEO (MEDIUM SIZE) */
.hero-video{
    position:relative;
    height:350px; /* 👈 IKKE FULLSCREEN */
    margin:40px 10%;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* video */
.hero-bg-video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* overlay */
.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

/* tekst */
.hero-content{
    position:relative;
    color:white;
    text-align:center;
    max-width:700px;
}

.hero-content h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero-content p{
    font-size:18px;
    color:#e2e8f0;
}

/* SPLIT */
.split{
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:60px;
    padding:80px 10%;
    align-items:center;
}

.split img,
.split video{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:16px;
}

.text h2{
    font-size:28px;
    margin-bottom:10px;
}

.text ul{
    color:#64748b;
    line-height:1.7;
    padding-left:18px;
}

/* reverse */
.reverse{ direction:rtl; }
.reverse .text{ direction:ltr; }

/* CTA */
.cta{
    text-align:center;
    padding:80px 10%;
}

.btn-main{
    background:linear-gradient(90deg,#0ea5e9,#3b82f6);
    padding:14px 28px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

/* FOOTER */
.footer{
    background:#0f172a;
    color:white;
    padding:40px 10%;
    display:flex;
    justify-content:space-between;
}

.footer-bottom{
    text-align:center;
    padding:15px;
    font-size:12px;
    background:#020617;
    color:#94a3b8;
}

/* MOBILE */
@media(max-width:768px){
    .split{ grid-template-columns:1fr; }
    .hero-video{ height:250px; }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">
        <img src="danpaylogo.jpg">
    </div>

    <div class="nav-right">
        <a href="index.html">← Forside</a>
        <a href="tel:+4570180099" class="phone">+45 70 18 00 99</a>
        <a href="#" class="cta-btn">Kontakt</a>
    </div>
</div>

<!-- 🔥 HERO VIDEO -->
<div class="hero-video">

    <video autoplay muted loop playsinline class="hero-bg-video">
        <source src="Betaling.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1>Restaurant, Café & Take-away</h1>
        <p>Alt du har brug for – samlet i én løsning</p>
    </div>

</div>

<!-- CONTENT -->
<div class="split">
    <img src="restaurant.jpg">
    <div class="text">
        <h2>Professionelt salgsværktøj</h2>
        <ul>
            <li>QR-bestilling</li>
            <li>Hurtig betaling</li>
            <li>Lagerstyring</li>
        </ul>
    </div>
</div>

<div class="cta">
    <h2>Klar til at optimere din restaurant?</h2>
    <a href="#" class="btn-main">Book demo</a>
</div>

<!-- FOOTER -->
<div class="footer">
    <div>DanPay ApS</div>
    <div>Kundeservice@danpay.dk</div>
</div>

<div class="footer-bottom">
    © 2026 Danpay
</div>

</body>
</html>
