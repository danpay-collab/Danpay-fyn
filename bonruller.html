<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonruller - Danpay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family:'Inter',sans-serif;
    margin:0;
    background:#f8fafc;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:20px 10%;
}

.logo img{ height:45px; }

.hero{
    text-align:center;
    padding:60px 10%;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding:40px 10%;
}

.product{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.product img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.price{
    font-weight:600;
    margin:10px 0;
}

.order{
    display:flex;
    gap:10px;
}

.order input{
    width:60px;
    text-align:center;
}

.btn{
    flex:1;
    background:linear-gradient(90deg,#0ea5e9,#3b82f6);
    border:none;
    color:black;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
}

/* 🛒 CART */
.cart{
    position:fixed;
    bottom:20px;
    right:20px;
    width:280px;
    background:white;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    padding:20px;
}

.cart h3{
    margin-top:0;
}

.cart-items{
    max-height:150px;
    overflow:auto;
    font-size:14px;
}

.cart button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">
        <img src="danpaylogo.jpg">
    </div>
</div>

<div class="hero">
    <h1>Bestil bonruller</h1>
    <p>Vælg produkter og bestil samlet</p>
</div>

<div class="products">

<!-- PRODUCT 1 -->
<div class="product">
<img src="ruller80.png">
<h3>80x80x12mm (30 stk)</h3>
<div class="price">599 kr</div>

<div class="order">
<input type="number" id="qty1" value="1" min="1">
<button onclick="addToCart('80x80x12mm',599,'qty1')" class="btn">Tilføj</button>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="product">
<img src="ruller57.png">
<h3>57x40x12mm (50 stk)</h3>
<div class="price">499 kr</div>

<div class="order">
<input type="number" id="qty2" value="1" min="1">
<button onclick="addToCart('57x40x12mm',499,'qty2')" class="btn">Tilføj</button>
</div>
</div>

</div>

<!-- 🛒 CART -->
<div class="cart">
<h3>🛒 Din kurv</h3>

<div id="cartItems" class="cart-items">
Ingen varer endnu
</div>

<button onclick="sendOrder()">Send bestilling</button>
</div>

<script>
let cart = [];

function addToCart(name, price, qtyId){
    const qty = document.getElementById(qtyId).value;

    cart.push({
        name: name,
        price: price,
        qty: qty
    });

    renderCart();
}

function renderCart(){
    const container = document.getElementById("cartItems");

    if(cart.length === 0){
        container.innerHTML = "Ingen varer endnu";
        return;
    }

    let html = "";
    cart.forEach(item => {
        html += `${item.name} x ${item.qty}<br>`;
    });

    container.innerHTML = html;
}

function sendOrder(){

    if(cart.length === 0){
        alert("Kurven er tom");
        return;
    }

    let body = "Hej DanPay,%0D%0A%0D%0AJeg vil gerne bestille:%0D%0A";

    cart.forEach(item => {
        body += `${item.name} - ${item.qty} stk%0D%0A`;
    });

    body += "%0D%0AMvh";

    window.location.href = `mailto:salg@danpay.dk?subject=Bestilling&body=${body}`;
}
</script>

</body>
</html>
